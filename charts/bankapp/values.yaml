# Default values for bankapp.
# This is a YAML-formatted file.

replicaCount: 1

domain: "98.93.105.120.nip.io"

image:
  repository: "amitabhdevops/devsecops-bankapp"  # Your Docker Hub repo URI
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

database:
  host: "db-service"
  port: 3306
  name: "bankapp"
  user: "bankuser"
  password: "" # To be provided from Secrets

ollama:
  url: "http://172.17.0.1:11434" # Docker bridge IP for reaching host container

gateway:
  name: "bankapp-gateway"
  className: "envoy" # Envoy Gateway Controller

nginx:
  enabled: true
  image: nginx:latest
  port: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
