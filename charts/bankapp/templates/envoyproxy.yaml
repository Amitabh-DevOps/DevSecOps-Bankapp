apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: bankapp-proxy-config
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        # Modern v1.x way to declare NodePorts
        ports:
          - name: http
            port: 80
            nodePort: 30080
          - name: https
            port: 443
            nodePort: 30443
  # Backup: Strategic Merge Patch (supported in EG 1.5+)
  infraPatch:
    type: StrategicMergePatch
    strategicMergePatches:
      - group: ""
        version: v1
        kind: Service
        name: envoy
        patch:
          spec:
            ports:
              - name: http
                port: 80
                nodePort: 30080
              - name: https
                port: 443
                nodePort: 30443