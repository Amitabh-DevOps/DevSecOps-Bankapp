apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bankapp.fullname" . }}-https-route
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: https
  hostnames:
    - {{ .Values.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /nginx
      backendRefs:
        - name: {{ include "bankapp.fullname" . }}-nginx
          port: {{ .Values.nginx.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "bankapp.fullname" . }}
          port: {{ .Values.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bankapp.fullname" . }}-http-redirect
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: http
  hostnames:
    - {{ .Values.domain | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
