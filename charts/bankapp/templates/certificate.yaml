apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: amitabhsoni2004@gmail.com  # Replace with your email for Let's Encrypt notifications
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: bankapp-prod
                
# Only ClusterIssuer is needed.
# The Certificate is managed automatically by the Gateway annotation.
